name: CI

on:
  push:
    branches: ['main', 'factory/**']
  pull_request:
    branches: ['main']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      # Build only needs env vars to satisfy lib/env.ts validation; placeholders let
      # CI compile-check without real secrets. Real secrets override if configured.
      - run: npm run build --if-present     # next build catches type + import errors
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      - run: npm test --if-present
